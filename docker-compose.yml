version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: waffle-redis
    ports:
      - "6379:6379"
    networks:
      - waffle-net
    restart: always
  db:
    image: mariadb:latest
    restart: always
    environment:
      - MARIADB_DATABASE=web
      - MARIADB_ROOT_PASSWORD=qwer1234
    ports:
      - "3307:3306"
    volumes:
      - ./db:/var/lib/mysql
    networks:
      - waffle-net
  app:
    build: .
    ports:
      - "443:443"
      - "8080:8080"
    environment:
      # --- Database & Redis ---
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=${DB_SERVER}
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_ID}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}

      # --- Security & JWT ---
      - JWT_KEY=${JWT_KEY}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - SERVER_SSL_KEY_STORE=${KEYSTORE}
      - SERVER_SSL_KEY_STORE_TYPE=${KEYSTORETYPE}
      - SERVER_SSL_KEY_STORE_PASSWORD=${KEYSTOREPASS}

      # --- OAuth2 (Social Login) ---
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID=${CLIENT_ID}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_SECRET=${CLIENT_SECRET}

      # --- Mail Settings ---
      - SPRING_MAIL_PORT=${MAIL_PORT}
      - SPRING_MAIL_USERNAME=${MAIL_ID}
      - SPRING_MAIL_PASSWORD=${MAIL_PASS}

      # --- MinIO & S3 Storage ---
      - MINIO_PROVIDER=${STORAGE_PROVIDER}
      - MINIO_ENDPOINT=${MINIO_API}
      - MINIO_ACCESS_KEY=${MINIO_NAME}
      - MINIO_SECRET_KEY=${MINIO_SECRET}
      - MINIO_BUCKET_CLOUD=${MINIO_CLOUD_BUCKET}
      - MINIO_BUCKET_WORK=${MINIO_WORKSPACE_BUCKET}
      - MINIO_REGION=${MINIO_REGION}

      - MINIO_S3_ENDPOINT=${S3AMAZON_API}
      - MINIO_S3_ACCESS_KEY=${S3AMAZON_NAME}
      - MINIO_S3_SECRET_KEY=${S3AMAZON_SECRET}
      - MINIO_S3_BUCKET_CLOUD=${S3AMAZON_CLOUD_BUCKET}
      - MINIO_S3_BUCKET_WORK=${S3AMAZON_WORKSPACE_BUCKET}
      - MINIO_S3_REGION=${S3AMAZON_REGION}

      # --- Admin & App Info ---
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_ROLE=${ADMIN_ROLE}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - APP_FRONTEND_URL=${APP_FRONTEND_URL}
      - APP_BACKEND_URL=${APP_BACKEND_URL}
      - APP_SECURE_COOKIE=false
      - PORTONE_PORTONE_SECRET=${PORTONE_SECRET}
    depends_on:
      - redis
      - db
    networks:
      - waffle-net
  websocket-server:
    image: node:lts-alpine
    command: sh -c "npm install -g y-websocket && npx y-websocket"  # 수정
    environment:
      - PORT=1234
      - HOST=0.0.0.0
    ports:
      - "1234:1234"
networks:
  waffle-net:
    driver: bridge