apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wafflebear.fullname" . }}-frontend-nginx
data:
  default.conf: |
    server {
      listen 80;
      charset utf-8;
      underscores_in_headers on;

      location = /api {
        return 404;
      }

      location ^~ /api/ {
        return 404;
      }

      location = /wss {
        return 404;
      }

      location ^~ /wss/ {
        return 404;
      }

      location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
      }
    }
